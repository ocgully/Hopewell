# Claude Code session-level hooks contributed by TaskFlow.
#
# These are merged into .claude/settings.json by Flotilla under the
# `flotilla:managed.taskflow` sentinel block. User-authored hooks in
# the same file are preserved across upgrades.
#
# The ProjectStart hook runs `taskflow resume` so every fresh Claude
# Code session sees the active claims + ready queue. The PreToolUse
# hook reminds the model not to read .taskflow/ directly.

hooks:
  SessionStart:
    - hooks:
        - type: command
          command: taskflow resume --quiet || true
